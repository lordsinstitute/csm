{% extends "partials/base.html" %}
{% block title %}Run TAM Assessment{% endblock %}
{% block page_title %}<i class="bi bi-play-circle-fill me-2"></i>Run TAM Assessment{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body p-4">
                <h5 style="font-weight:700; color:#1a3a5c;" class="mb-4">Technical Assessment Methodology (TAM) Evaluation</h5>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-600">Select Asset</label>
                        <select name="asset" class="form-select" required style="border-radius:10px;">
                            <option value="">-- Choose Plant Asset --</option>
                            {% for asset in assets %}
                            <option value="{{ asset.pk }}">{{ asset.name }} ({{ asset.get_asset_type_display }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-600">Confidentiality Score <small class="text-muted">(1-10)</small></label>
                            <input type="number" name="confidentiality" class="form-control" min="1" max="10" value="5" step="0.1" style="border-radius:10px;" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-600">Integrity Score <small class="text-muted">(1-10)</small></label>
                            <input type="number" name="integrity" class="form-control" min="1" max="10" value="5" step="0.1" style="border-radius:10px;" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-600">Availability Score <small class="text-muted">(1-10)</small></label>
                            <input type="number" name="availability" class="form-control" min="1" max="10" value="5" step="0.1" style="border-radius:10px;" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-600">Threat Likelihood <small class="text-muted">(1-10)</small></label>
                            <input type="number" name="likelihood" class="form-control" min="1" max="10" value="5" step="0.1" style="border-radius:10px;" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-600">Vulnerability Factor <small class="text-muted">(1-10)</small></label>
                            <input type="number" name="vulnerability" class="form-control" min="1" max="10" value="5" step="0.1" style="border-radius:10px;" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-600">Control Effectiveness <small class="text-muted">(1-10)</small></label>
                            <input type="number" name="control_effectiveness" class="form-control" min="1" max="10" value="5" step="0.1" style="border-radius:10px;" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-600">Assessment Notes</label>
                        <textarea name="notes" class="form-control" rows="3" style="border-radius:10px;" placeholder="Add any relevant notes..."></textarea>
                    </div>
                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary px-4"><i class="bi bi-play-fill me-2"></i>Run Assessment</button>
                        <a href="{% url 'risk_assessment:list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
