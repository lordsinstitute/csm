{% extends "partials/base.html" %}
{% block title %}Delete Policy{% endblock %}
{% block page_title %}<i class="bi bi-trash-fill me-2"></i>Delete Policy{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card">
            <div class="card-body p-4 text-center">
                <div style="font-size:52px; color:#d32f2f; margin-bottom:12px;">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                <h5 style="font-weight:700; color:#1a3a5c;">Delete Security Policy?</h5>
                <div style="background:#fff3f3; border-radius:10px; padding:16px; margin:20px 0;">
                    <div style="font-weight:700; color:#d32f2f;">{{ policy.policy_number }}</div>
                    <div style="color:#555;">{{ policy.title }}</div>
                </div>
                <form method="post" class="d-flex gap-3 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-trash-fill me-2"></i>Yes, Delete
                    </button>
                    <a href="{% url 'security_controls:policy_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
